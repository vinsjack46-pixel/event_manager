<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione | Gestione Gare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e90ff;
            --bg-gradient: linear-gradient(135deg, #00ced1 0%, #1e90ff 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px; /* Più stretto per il form */
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card-header-custom {
            padding: 30px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .registration-body {
            padding: 30px;
        }

        /* Stile Input coerente con il design */
        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #f0f2f5;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25 margin-bottom: rgba(30, 144, 255, 0.1);
        }

        .btn-register {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            padding: 14px;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-register:hover {
            background-color: #1c81e6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.3);
            color: white;
        }

        .footer-link {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .footer-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        /* Icone nei campi */
        .input-group-text {
            background: white;
            border: 2px solid #f0f2f5;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #aaa;
        }

        .has-icon .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
    </style>
</head>
<body>

    <div class="main-card animate__animated animate__fadeIn">
        <div class="card-header-custom">
            <h2 class="fw-bold mb-1">Registrazione</h2>
            <p class="text-muted mb-0">Crea il profilo per la tua società</p>
        </div>

        <form id="registrationForm" class="registration-body">
            <div class="mb-3">
                <label class="form-label">Nome Società</label>
                <div class="input-group has-icon">
                    <span class="input-group-text"><i class="fas fa-university"></i></span>
                    <input type="text" id="regNome" class="form-control" placeholder="es. ASD Nuoto Esempio" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Istituzionale</label>
                <div class="input-group has-icon">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="regEmail" class="form-control" placeholder="societa@email.it" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group has-icon">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="regPassword" class="form-control" placeholder="Minimo 6 caratteri" required>
                </div>
            </div>

            <button type="submit" class="btn btn-register">
                <i class="fas fa-user-plus me-2"></i>Registrati Ora
            </button>
        </form>

        <div class="footer-link">
            <span class="text-muted">Hai già un account?</span> 
            <a href="login.html">Accedi qui</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        const sb = window.supabaseClient;

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('regNome').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                // 1. Registrazione su Supabase Auth
                const { data, error: authError } = await sb.auth.signUp({
                    email: email,
                    password: password,
                });

                if (authError) throw authError;

                if (data.user) {
                    // 2. Inserimento dati nella tabella 'societa'
                    const { error: dbError } = await sb.from('societa').insert([
                        { 
                            user_id: data.user.id, 
                            nome: nome,
                            email: email,
                            is_admin: false 
                        }
                    ]);

                    if (dbError) throw dbError;

                    alert("Registrazione completata! Controlla la tua email per confermare l'account.");
                    window.location.href = 'login.html';
                }
            } catch (error) {
                alert("Errore durante la registrazione: " + error.message);
            }
        });
    </script>
</body>
</html>
