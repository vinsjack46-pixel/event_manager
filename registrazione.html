<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Società | Gestione Gare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e90ff;
            --bg-gradient: linear-gradient(135deg, #00ced1 0%, #1e90ff 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px; /* Leggermente più stretto per i form */
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card-header-custom {
            padding: 30px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .form-section {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #f0f2f5;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25 margin-bottom: rgba(30, 144, 255, 0.1);
        }

        .input-group-text {
            background: #f8f9fa;
            border: 2px solid #f0f2f5;
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #777;
        }

        .form-control-with-icon {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .btn-register {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            padding: 14px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #1c86ee;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.3);
            color: white;
        }

        .footer-link {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .footer-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="card-header-custom">
            <h2 class="fw-bold mb-1">Crea Account</h2>
            <p class="text-muted mb-0">Registra la tua società sportiva</p>
        </div>

        <div class="form-section">
            <form id="registrazioneForm">
                <div class="mb-3">
                    <label class="form-label">Nome Società</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-building"></i></span>
                        <input type="text" id="nomeSocieta" class="form-control form-control-with-icon" placeholder="Es. ASD Olimpia" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Conferma Email</label>
                        <input type="email" id="emailConfirm" class="form-control" placeholder="Ripeti Email" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Conferma Password</label>
                        <input type="password" id="passwordConfirm" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Codice Fiscale / P.IVA</label>
                        <input type="text" id="cfs" class="form-control" maxlength="16" minlength="11" placeholder="11 o 16 caratteri">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cellulare Tecnico</label>
                        <input type="text" id="cell" class="form-control" maxlength="10" minlength="10" placeholder="3331234567">
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus me-2"></i>Registrati Ora
                </button>
            </form>
        </div>

        <div class="footer-link">
            <p class="mb-0 text-muted">Già registrato? <a href="login.html">Accedi qui</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('registrazioneForm').addEventListener('submit', function(e) {
            // Qui puoi aggiungere la logica di validazione JavaScript prima dell'invio a Supabase
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            
            if(pass !== confirm) {
                e.preventDefault();
                alert("Le password non coincidono!");
            }
        });
    </script>
</body>
</html>
