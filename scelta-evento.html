<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selezione Evento | Gestione Gare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e90ff;
            --admin-color: #ffc107;
            --bg-gradient: linear-gradient(135deg, #00ced1 0%, #1e90ff 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card-header-custom {
            padding: 30px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .event-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
        }

        .event-item {
            border: 2px solid #f0f2f5;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: white;
        }

        .event-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.1);
        }

        .event-info h5 {
            margin: 0;
            font-weight: 700;
            color: #333;
        }

        .event-info small {
            color: #777;
            display: block;
            margin-top: 4px;
        }

        .btn-select {
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 16px;
            transition: 0.3s;
        }

        #adminBadge {
            background: #fff3cd;
            padding: 15px 20px;
            border-bottom: 1px solid #ffeeba;
        }

        .logout-section {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
        }

        /* Scrollbar personalizzata */
        .event-list::-webkit-scrollbar { width: 6px; }
        .event-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-card animate__animated animate__fadeIn">
        
        <div id="adminBadge" style="display: none;">
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-dark small"><i class="fas fa-user-shield me-2"></i>Accesso Amministratore</span>
                <a href="admin.html" class="btn btn-warning btn-sm fw-bold">
                    <i class="fas fa-cog me-1"></i> Dashboard Admin
                </a>
            </div>
        </div>

        <div class="card-header-custom">
            <h2 class="fw-bold mb-1">Seleziona Evento</h2>
            <p class="text-muted mb-0">Gestisci le iscrizioni per le competizioni attive</p>
        </div>

        <div id="eventContainer" class="event-list">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Caricamento eventi...</p>
            </div>
        </div>

        <div class="logout-section">
            <button class="btn btn-link text-danger text-decoration-none fw-600" onclick="logout()">
                <i class="fas fa-sign-out-alt me-1"></i> Esci dal sistema
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        const sb = window.supabaseClient;

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Controllo Admin
            const { data: soc } = await sb.from('societa').select('is_admin').eq('user_id', user.id).single();
            if (soc?.is_admin) {
                document.getElementById('adminBadge').style.display = 'block';
            }

            // Caricamento Eventi
            const { data: eventi, error } = await sb.from('eventi')
                .select('*')
                .eq('attivo', true)
                .order('data_evento', { ascending: true });
            
            const container = document.getElementById('eventContainer');
            container.innerHTML = '';

            if (eventi && eventi.length > 0) {
                eventi.forEach(e => {
                    const dataFormattata = new Date(e.data_evento).toLocaleDateString('it-IT', {
                        day: '2-digit', month: 'long', year: 'numeric'
                    });
                    
                    container.innerHTML += `
                        <div class="event-item" onclick="selezionaEvento('${e.id}', '${e.nome.replace(/'/g, "\\'")}')">
                            <div class="event-info">
                                <h5>${e.nome}</h5>
                                <small><i class="far fa-calendar-alt me-1"></i> ${dataFormattata} • <i class="fas fa-map-marker-alt me-1"></i> ${e.luogo || 'Sede da definire'}</small>
                            </div>
                            <div class="btn-select">
                                <i class="fas fa-chevron-right"></i>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-calendar-times fa-3x text-muted mb-3"></i>
                        <p class="text-muted">Nessun evento attivo disponibile.</p>
                    </div>`;
            }
        }

        function selezionaEvento(id, nome) {
            sessionStorage.setItem('selectedEventId', id);
            sessionStorage.setItem('selectedEventName', nome);
            window.location.href = 'index.html';
        }

        async function logout() {
            if(confirm("Sei sicuro di voler uscire?")) {
                await sb.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        init();
    </script>
</body>
</html>
