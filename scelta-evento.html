<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleziona Evento | Gestionale Karate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --admin-color: #f59e0b;
            --bg-soft: #f8fafc;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-soft);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .main-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            background: white;
            overflow: hidden;
        }

        .header-section {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .header-section h2 {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Badge Admin elegante */
        .admin-link {
            position: absolute;
            top: 20px;
            right: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--admin-color);
            padding: 8px 16px;
            border: 1.5px solid var(--admin-color);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .admin-link:hover {
            background: var(--admin-color);
            color: white;
        }

        /* Stile Card Eventi */
        .event-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        .event-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .event-info h5 {
            margin: 0;
            font-weight: 600;
            color: var(--text-main);
        }

        .event-meta {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 4px;
        }

        .event-meta i {
            width: 18px;
            color: var(--primary-color);
        }

        .btn-select {
            background: #eff6ff;
            color: var(--primary-color);
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            transition: 0.3s;
        }

        .event-card:hover .btn-select {
            background: var(--primary-color);
            color: white;
        }

        .logout-wrapper {
            padding: 20px;
            background: #fdfdfd;
            border-top: 1px solid #f1f5f9;
        }

        /* Loading Skeleton */
        .spinner-border {
            color: var(--primary-color);
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6 position-relative">
                
                <div id="adminBadge" style="display: none;">
                    <a href="admin.html" class="admin-link">
                        <i class="fa-solid fa-user-shield me-1"></i> Admin Panel
                    </a>
                </div>

                <div class="card main-card">
                    <div class="header-section">
                        <div class="mb-3">
                            <i class="fa-solid fa-calendar-check fa-3x text-primary"></i>
                        </div>
                        <h2>Seleziona Evento</h2>
                        <p class="text-muted">Bentornato! Seleziona una competizione per gestire le iscrizioni.</p>
                    </div>

                    <div class="p-4 pt-0">
                        <div id="eventContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border" role="status"></div>
                                <p class="mt-2 text-muted">Caricamento eventi in corso...</p>
                            </div>
                        </div>

                        <div class="logout-wrapper text-center mt-3">
                            <button class="btn btn-link text-danger text-decoration-none fw-semibold" onclick="logout()">
                                <i class="fa-solid fa-right-from-bracket me-1"></i> Disconnetti Società
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        const sb = window.supabaseClient;

        async function init() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Controllo Admin
            const { data: soc } = await sb.from('societa').select('is_admin').eq('user_id', user.id).single();
            if (soc?.is_admin) {
                document.getElementById('adminBadge').style.display = 'block';
            }

            // Caricamento Eventi
            const { data: eventi, error } = await sb.from('eventi')
                .select('*')
                .eq('attivo', true)
                .order('data_evento', { ascending: true });
            
            const container = document.getElementById('eventContainer');
            container.innerHTML = '';

            if (eventi && eventi.length > 0) {
                eventi.forEach(e => {
                    const dataFormattata = new Date(e.data_evento).toLocaleDateString('it-IT', {
                        day: 'numeric', month: 'long', year: 'numeric'
                    });

                    container.innerHTML += `
                        <div class="event-card shadow-sm" onclick="selezionaEvento('${e.id}', '${e.nome.replace(/'/g, "\\'")}')">
                            <div class="event-info">
                                <h5>${e.nome}</h5>
                                <div class="event-meta">
                                    <span><i class="fa-regular fa-calendar"></i> ${dataFormattata}</span><br>
                                    <span><i class="fa-solid fa-location-dot"></i> ${e.luogo || 'Sede da definire'}</span>
                                </div>
                            </div>
                            <button class="btn-select">
                                Scegli <i class="fa-solid fa-chevron-right ms-1"></i>
                            </button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `
                    <div class="text-center py-5 border rounded-4 bg-light">
                        <i class="fa-solid fa-inbox fa-3x text-muted mb-3"></i>
                        <p class="h6 text-muted">Nessun evento attivo al momento.</p>
                    </div>`;
            }
        }

        function selezionaEvento(id, nome) {
            sessionStorage.setItem('selectedEventId', id);
            sessionStorage.setItem('selectedEventName', nome);
            window.location.href = 'index.html';
        }

        async function logout() {
            if(confirm("Sei sicuro di voler uscire?")) {
                await sb.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        init();
    </script>
</body>
</html>
