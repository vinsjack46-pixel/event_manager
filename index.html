<form id="athleteForm">
    <input type="hidden" id="selectedEventId">

    <div class="row mb-4">
        <div class="col-12">
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="regType" id="typeIndividual" value="individual" checked onchange="toggleRegMode()">
                <label class="btn btn-outline-primary py-2 fw-semibold" for="typeIndividual">
                    <i class="fas fa-user me-2"></i>Atleta Singolo
                </label>

                <input type="radio" class="btn-check" name="regType" id="typeTeam" value="team" onchange="toggleRegMode()">
                <label class="btn btn-outline-primary py-2 fw-semibold" for="typeTeam">
                    <i class="fas fa-users me-2"></i>Team / Squadra
                </label>
            </div>
        </div>
    </div>

    <div class="registration-dynamic-section">
        
        <div id="individualFields">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary">Nome</label>
                    <input type="text" id="first_name" class="form-control form-control-lg" placeholder="Mario">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary">Cognome</label>
                    <input type="text" id="last_name" class="form-control form-control-lg" placeholder="Rossi">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary">Genere</label>
                    <select id="gender" class="form-select form-select-lg">
                        <option value="Maschio">Maschio</option>
                        <option value="Femmina">Femmina</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary">Data di Nascita</label>
                    <input type="date" id="birthdate" class="form-control form-control-lg" onchange="handleBirthdateChange()">
                    <small id="dateError" class="text-danger" style="display:none;">Data non valida</small>
                </div>
            </div>
        </div>

        <div id="teamFields" style="display: none;">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-bold text-success small">Nome della Squadra</label>
                    <input type="text" id="team_name" class="form-control form-control-lg border-success" placeholder="Es: Ken Zen Ichiro Squadra A">
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold text-secondary">Componenti della Squadra</label>
                    <div id="membersContainer" class="row g-2">
                        </div>
                    <button type="button" class="btn btn-sm btn-link text-decoration-none mt-1" onclick="addMemberField()">
                        <i class="fas fa-plus-circle"></i> Aggiungi Componente
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="technical-section border-top pt-4 mt-4">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Classe</label>
                <select id="classe" class="form-select form-select-lg bg-light" required></select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Cintura</label>
                <select id="belt" class="form-select form-select-lg" required></select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Specialità</label>
                <select id="specialty" class="form-select form-select-lg" required onchange="handleSpecialtyChange()"></select>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold text-secondary">Peso / Para</label>
                <select id="weight_category" class="form-select form-select-lg" disabled></select>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <button type="submit" class="btn btn-primary w-100 fw-bold py-3 shadow-sm rounded-3">
                    <i class="fas fa-save me-2"></i>CONFERMA E REGISTRA
                </button>
            </div>
        </div>
    </div>
</form>
