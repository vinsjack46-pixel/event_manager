<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera Password | Gestione Gare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e90ff;
            --bg-gradient: linear-gradient(135deg, #00ced1 0%, #1e90ff 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card-header-custom {
            padding: 30px 20px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .form-section {
            padding: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #f0f2f5;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(30, 144, 255, 0.1);
        }

        .btn-reset {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            padding: 14px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background-color: #1c86ee;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.3);
            color: white;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: rgba(30, 144, 255, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
        }

        .footer-link {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .footer-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="main-card animate__animated animate__fadeIn">
        <div class="card-header-custom">
            <div class="icon-circle">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="fw-bold mb-1">Password dimenticata?</h2>
            <p class="text-muted mb-0">Riceverai un link via email per impostarne una nuova.</p>
        </div>

        <div class="form-section">
            <form id="resetForm">
                <div class="mb-4">
                    <label class="form-label">Indirizzo Email</label>
                    <div class="input-group">
                        <input type="email" id="resetEmail" class="form-control" placeholder="Inserisci la tua email" required>
                    </div>
                </div>

                <button type="submit" class="btn-reset">
                    <i class="fas fa-paper-plane me-2"></i>Invia Link di Ripristino
                </button>
            </form>
        </div>

        <div class="footer-link">
            <p class="mb-0 text-muted">Ricordi la password? <a href="login.html">Torna al login</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const email = document.getElementById('resetEmail').value;
            
            // UI Feedback
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Invio in corso...';

            try {
                // Usiamo supabaseClient (il nome che hai definito in script.js)
                const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
                   redirectTo: 'https://event-manager-pearl-five.vercel.app/update-password.html',
                });

                if (error) {
                    alert("Errore: " + error.message);
                } else {
                    alert("Email inviata! Controlla la tua posta in arrivo (anche la cartella Spam).");
                }
            } catch (err) {
                alert("Si è verificato un errore inaspettato.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Invia Link di Ripristino';
            }
        });
    </script>
</body>
</html>
