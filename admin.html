<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pannello Admin - Gestione Eventi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid mt-4">
        <h2>Dashboard Amministratore</h2>
            <a href="scelta-evento.html" class="btn btn-outline-secondary btn-sm">← Torna alla Selezione Eventi</a>
        <div>
        <hr>
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h4>Crea Nuovo Evento</h4>
                    <form id="eventForm">
                        <input type="text" id="eventName" class="form-control mb-2" placeholder="Nome Evento" required>
                        <input type="date" id="eventDate" class="form-control mb-2" required>
                        <input type="text" id="eventLocation" class="form-control mb-2" placeholder="Luogo">
                        <button type="submit" class="btn btn-success btn-block">Crea Evento</button>
                    </form>
                    <hr>
                    <h5>Eventi Esistenti</h5>
                    <ul id="eventList" class="list-group"></ul>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-3 shadow-sm">
                    <h4>Lista Globale Iscritti <span id="totalCounter" class="badge badge-primary">0</span></h4>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <select id="filterEvent" class="form-control">
                                <option value="">Tutti gli Eventi</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <input type="text" id="globalSearch" class="form-control" placeholder="Cerca per Nome, Cognome, Società, Classe...">
                        </div>
                    </div>

                    <div class="table-responsive" style="max-height: 600px;">
                        <table class="table table-sm table-hover">
                            <thead>
                                <tr>
                                    <th>Atleta</th>
                                    <th>Evento</th>
                                    <th>Società</th>
                                    <th>Classe/Spec.</th>
                                    <th>Peso</th>
                                    <th>Sesso</th>
                                </tr>
                            </thead>
                            <tbody id="adminAthleteList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="admin-logic.js"></script>
</body>
</html>
