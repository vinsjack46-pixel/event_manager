 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Società - Gestionale Karate</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Stile extra per centrare il login e renderlo moderno */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            /* Usiamo il gradiente coerente con il tuo progetto */
            background: linear-gradient(45deg, #00ced1, #1e90ff);
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: #555;
        }

        .btn-login {
            background-color: #1e90ff;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background-color: #00ced1;
            transform: translateY(-2px);
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Accesso Società</h1>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="esempio@mail.it" required>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
           
            <button type="submit" class="btn btn-primary w-100 btn-login shadow-sm">Accedi</button>
        </form>

        <div class="footer-links">
            <p class="mb-1">Non hai un account? <a href="registrazione.html" class="text-decoration-none">Registrati</a></p>
            <p><a href="recupero.html" id="forgotPasswordLink" class="text-muted">Password dimenticata?</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
 <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = e.target.querySelector('button');

        // UI Feedback: disabilitiamo il tasto mentre lavora
        btn.disabled = true;
        btn.innerHTML = 'Accesso in corso...';

        const { data, error } = await window.supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("Errore di accesso: " + error.message);
            btn.disabled = false;
            btn.innerHTML = 'Accedi';
        } else {
            // Se il login è ok, vai alla pagina admin
            window.location.href = 'admin.html';
        }
    });
</script>
</body>
</html>
