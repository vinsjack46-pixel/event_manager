 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiorna Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(45deg, #00ced1, #1e90ff); display: flex; align-items: center; min-height: 100vh;">
    <div class="container" style="background: white; padding: 30px; border-radius: 15px; max-width: 400px; shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h2 class="text-center mb-4">Nuova Password</h2>
        <form id="updatePasswordForm">
            <div class="mb-3">
                <label class="form-label">Nuova Password</label>
                <input type="password" id="newPassword" class="form-control" placeholder="Minimo 6 caratteri" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Conferma Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Ripeti password" required>
            </div>
            <button type="submit" id="btnUpdate" class="btn btn-primary w-100">Aggiorna Password</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        // Rimuoviamo qualsiasi controllo "onLoad" che rimanda al login
        document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('btnUpdate');

            if (newPassword !== confirmPassword) {
                alert('Le password non corrispondono.');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Aggiornamento...";

            try {
                const { error } = await window.supabaseClient.auth.updateUser({ 
                    password: newPassword 
                });

                if (error) throw error;

                alert('Password aggiornata con successo! Ora verrai reindirizzato al login.');
                window.location.href = 'login.html'; 
            } catch (error) {
                alert('Errore: ' + error.message);
                btn.disabled = false;
                btn.innerText = "Aggiorna Password";
            }
        });
    </script>
</body>
</html>
